<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="520">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e3f"/>
      <stop offset="100%" stop-color="#2a2a4a"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="15" font-weight="600" letter-spacing="0.5">ROUTING ARCHITECTURE</text>

  <!-- Step 1: User Message -->
  <rect x="300" y="54" width="200" height="44" rx="22" fill="url(#accent1)" opacity="0.9" filter="url(#glow)"/>
  <text x="400" y="81" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="13" font-weight="600">User Message</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="98" x2="400" y2="120" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="395,118 400,128 405,118" fill="#6366f1"/>

  <!-- Step 2: Embed -->
  <rect x="310" y="130" width="180" height="36" rx="8" fill="url(#card)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="153" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11">EmbeddingProvider</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="166" x2="400" y2="188" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="395,186 400,196 405,186" fill="#6366f1"/>

  <!-- Step 3: Hybrid Retrieval -->
  <rect x="120" y="198" width="560" height="70" rx="10" fill="url(#card)" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="400" y="218" text-anchor="middle" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Hybrid Retrieval</text>

  <!-- Vector box -->
  <rect x="145" y="226" width="160" height="32" rx="6" fill="#0e2a3a" stroke="#06b6d4" stroke-width="1"/>
  <text x="225" y="247" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="10">Vector Search</text>

  <!-- BM25 box -->
  <rect x="320" y="226" width="160" height="32" rx="6" fill="#0e2a3a" stroke="#06b6d4" stroke-width="1"/>
  <text x="400" y="247" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="10">BM25 Keyword</text>

  <!-- RRF box -->
  <rect x="495" y="226" width="160" height="32" rx="6" fill="#0e2a3a" stroke="#f59e0b" stroke-width="1"/>
  <text x="575" y="247" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="10">RRF Score Fusion</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="268" x2="400" y2="296" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="395,294 400,304 405,294" fill="#06b6d4"/>

  <!-- Step 4: LLM Judge -->
  <rect x="260" y="306" width="280" height="44" rx="8" fill="url(#card)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="325" text-anchor="middle" fill="#fde68a" font-family="system-ui,sans-serif" font-size="12" font-weight="600">LLM Topic Judge</text>
  <text x="400" y="341" text-anchor="middle" fill="#a8a29e" font-family="monospace" font-size="9">existing topic? new topic? related?</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="350" x2="400" y2="378" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="395,376 400,386 405,376" fill="#f59e0b"/>

  <!-- Step 5: Context Assembly -->
  <rect x="240" y="388" width="320" height="44" rx="8" fill="url(#card)" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="407" text-anchor="middle" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Context Assembly</text>
  <text x="400" y="423" text-anchor="middle" fill="#a8a29e" font-family="monospace" font-size="9">system + topic history + linked topics + current</text>

  <!-- Arrow 5 -->
  <line x1="400" y1="432" x2="400" y2="454" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="395,452 400,462 405,452" fill="#10b981"/>

  <!-- Step 6: LLM Response -->
  <rect x="300" y="464" width="200" height="44" rx="22" fill="url(#accent4)" opacity="0.9" filter="url(#glow)"/>
  <text x="400" y="491" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Focused Response</text>

  <!-- Side labels -->
  <text x="60" y="236" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" transform="rotate(-90,60,236)">RETRIEVE</text>
  <text x="760" y="330" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10" transform="rotate(90,760,330)">CLASSIFY</text>
</svg>
