<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="800" y2="360">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="360" fill="url(#bg2)" rx="12"/>

  <text x="400" y="32" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="15" font-weight="600" letter-spacing="0.5">TOPIC-AWARE ROUTING IN ACTION</text>

  <!-- Timeline -->
  <line x1="60" y1="70" x2="740" y2="70" stroke="#334155" stroke-width="1.5"/>

  <!-- Messages on timeline -->
  <!-- Msg 1 -->
  <circle cx="120" cy="70" r="16" fill="#6366f1" opacity="0.9"/>
  <text x="120" y="74" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10" font-weight="700">1</text>
  <text x="120" y="56" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">AWS</text>

  <!-- Msg 2 -->
  <circle cx="230" cy="70" r="16" fill="#f59e0b" opacity="0.9"/>
  <text x="230" y="74" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10" font-weight="700">2</text>
  <text x="230" y="56" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">Cake</text>

  <!-- Msg 3 -->
  <circle cx="340" cy="70" r="16" fill="#6366f1" opacity="0.9"/>
  <text x="340" y="74" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10" font-weight="700">3</text>
  <text x="340" y="56" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">AWS</text>

  <!-- Msg 4 -->
  <circle cx="450" cy="70" r="16" fill="#f59e0b" opacity="0.9"/>
  <text x="450" y="74" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10" font-weight="700">4</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">Cake</text>

  <!-- Msg 5 -->
  <circle cx="560" cy="70" r="16" fill="#10b981" opacity="0.9"/>
  <text x="560" y="74" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10" font-weight="700">5</text>
  <text x="560" y="56" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">Python</text>

  <!-- Msg 6 -->
  <circle cx="670" cy="70" r="16" fill="#6366f1" opacity="0.9"/>
  <text x="670" y="74" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="10" font-weight="700">6</text>
  <text x="670" y="56" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="9">AWS</text>

  <!-- Routing lines to topics -->
  <!-- Topic A: AWS (purple) -->
  <rect x="40" y="140" width="340" height="60" rx="10" fill="#1e1e3f" stroke="#6366f1" stroke-width="2"/>
  <circle cx="70" cy="170" r="12" fill="#6366f1"/>
  <text x="70" y="174" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="9" font-weight="700">A</text>
  <text x="100" y="163" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Topic A: AWS Deployment</text>
  <text x="100" y="182" fill="#64748b" font-family="monospace" font-size="10">Messages: 1 → 3 → 6  |  Context: 3 msgs</text>

  <line x1="120" y1="86" x2="120" y2="140" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <line x1="340" y1="86" x2="280" y2="140" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <line x1="670" y1="86" x2="370" y2="140" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>

  <!-- Topic B: Cooking (amber) -->
  <rect x="40" y="220" width="340" height="60" rx="10" fill="#1e1e3f" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="70" cy="250" r="12" fill="#f59e0b"/>
  <text x="70" y="254" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="9" font-weight="700">B</text>
  <text x="100" y="243" fill="#fde68a" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Topic B: Chocolate Cake Recipe</text>
  <text x="100" y="262" fill="#64748b" font-family="monospace" font-size="10">Messages: 2 → 4  |  Context: 2 msgs</text>

  <line x1="230" y1="86" x2="200" y2="220" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <line x1="450" y1="86" x2="300" y2="220" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>

  <!-- Topic C: Python (green) -->
  <rect x="40" y="300" width="340" height="50" rx="10" fill="#1e1e3f" stroke="#10b981" stroke-width="2"/>
  <circle cx="70" cy="325" r="12" fill="#10b981"/>
  <text x="70" y="329" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="9" font-weight="700">C</text>
  <text x="100" y="320" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Topic C: Python Basics</text>
  <text x="100" y="337" fill="#64748b" font-family="monospace" font-size="10">Messages: 5  |  Context: 1 msg</text>

  <line x1="560" y1="86" x2="250" y2="300" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>

  <!-- Comparison box -->
  <rect x="430" y="140" width="340" height="210" rx="10" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="600" y="165" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Context Window Comparison</text>

  <!-- Traditional -->
  <rect x="450" y="180" width="140" height="32" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="520" y="200" text-anchor="middle" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Traditional</text>
  <text x="520" y="226" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">All 6 msgs = diluted</text>
  <rect x="450" y="236" width="140" height="6" rx="3" fill="#1e1e3f"/>
  <rect x="450" y="236" width="140" height="6" rx="3" fill="#ef4444" opacity="0.4"/>
  <text x="520" y="258" text-anchor="middle" fill="#ef4444" font-family="system-ui,sans-serif" font-size="10">Low Relevance</text>

  <!-- LCA -->
  <rect x="620" y="180" width="140" height="32" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="690" y="200" text-anchor="middle" fill="#86efac" font-family="system-ui,sans-serif" font-size="10" font-weight="600">LCA Engine</text>
  <text x="690" y="226" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">Only 3 msgs = focused</text>
  <rect x="620" y="236" width="140" height="6" rx="3" fill="#1e1e3f"/>
  <rect x="620" y="236" width="140" height="6" rx="3" fill="#22c55e" opacity="0.7"/>
  <text x="690" y="258" text-anchor="middle" fill="#22c55e" font-family="system-ui,sans-serif" font-size="10">High Relevance</text>

  <!-- Stats -->
  <text x="600" y="290" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Token savings: ~50% per request</text>
  <text x="600" y="308" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Attention focus: topic-relevant only</text>
  <text x="600" y="326" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Response quality: significantly improved</text>
</svg>
